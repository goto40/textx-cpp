name: C/C++ CI

on:
  push:
      branches: [ master ]
  pull_request:
      branches: [ master ]

jobs:
  build-and-test:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
            submodules: recursive
      - name: install
        run: sudo apt install -y cmake g++-10 libboost-regex-dev catch
      - name: build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_CXX_COMPILER=g++-10
          make
          ./textx_unit_tests 
